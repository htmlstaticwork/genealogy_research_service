<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Fam Tree</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://lucide.dev/favicon.ico">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-secondary);
        }

        .auth-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            position: relative;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .auth-logo i {
            width: 50px;
            height: 50px;
            color: var(--secondary-color);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
        }

        .input-group input {
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: var(--border-radius);
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        .eye-toggle {
            position: absolute;
            right: 1rem;
            top: 2.2rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .auth-controls {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        [dir="rtl"] .auth-controls {
            left: 1rem;
            right: auto;
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .social-btn:hover {
            border-color: var(--secondary-color);
            background: var(--bg-secondary);
        }
    </style>
</head>

<body data-theme="light">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-controls">
                <button class="icon-btn theme-toggle" style="padding: 0.3rem;" aria-label="Toggle Dark Mode"><i
                        data-lucide="moon"></i></button>
                <button class="icon-btn rtl-toggle" style="padding: 0.3rem;" aria-label="Toggle RTL Mode"><i
                        data-lucide="languages"></i></button>
            </div>

            <div class="auth-logo">
                <a href="index.html" class="logo" style="justify-content: center; font-size: 1.8rem; margin-bottom: 0.5rem;">
                    <i data-lucide="tree-pine" style="width: 32px; height: 32px;"></i>
                    <span>Fam Tree</span>
                </a>
                <h2 style="margin: 0; font-size: 1.5rem;">Join Fam Tree</h2>
                <p>Start your historical journey today</p>
            </div>

            <form class="auth-form" action="dashboard.html">
                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" placeholder="John" required>
                    </div>
                    
                
                <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Doe" required>
                    </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password-input" placeholder="••••••••" required>
                    <i data-lucide="eye" class="eye-toggle" id="eye-toggle"></i>
                </div>

                <div style="font-size: 0.8rem; color: var(--text-secondary);">
                    By signing up, you agree to our <a href="#" style="color: var(--secondary-color);">Terms of
                        Service</a> and <a href="#" style="color: var(--secondary-color);">Privacy Policy</a>.
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Create
                    Account</button>
            </form>

            <div style="margin: 1.5rem 0; text-align: center; position: relative;">
                <span
                    style="background: var(--card-bg); padding: 0 1rem; position: relative; z-index: 1; color: var(--text-secondary);">Or
                    join with</span>
                <div
                    style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--border-color);">
                </div>
            </div>

            <div class="social-auth">
                <button class="social-btn">
                    <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
                <button class="social-btn">
                    <svg style="width: 18px; height: 18px;" viewBox="0 0 384 512">
                        <path fill="currentColor" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
                    </svg>
                    Apple
                </button>
            </div>

            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
                Already a member? <a href="login.html"
                    style="color: var(--secondary-color); text-decoration: none; font-weight: 600;">Sign In</a>
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();

        // Eye Toggle
        const passInput = document.getElementById('password-input');
        const eyeBtn = document.getElementById('eye-toggle');

        eyeBtn.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            eyeBtn.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });
    </script>
</body>

</html>
